name: Release

# 触发：push 形如 v1.2.3 的 tag
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare-release:
    runs-on: ubuntu-22.04
    outputs:
      release_id: ${{ steps.release.outputs.result }}
    steps:
      - name: Ensure GitHub Release
        id: release
        uses: actions/github-script@v8
        env:
          RELEASE_BODY: |
            ## 本次更新亮点

            - **手动切号定位优化**：手动切号成功后会自动定位并高亮切换后的账号卡片。
            - **切号失败自动重试**：登录回调未成功落到目标账号时，会自动再尝试一次，减少需要手动重复点击登录的情况。
            - **自动切号优先级优化**：自动切号会优先选择满足条件且有效期最短的账号。
            - **账号搜索体验优化**：搜索范围对齐邮箱、auth_token 和套餐类型，并适当加宽搜索框。
            - **登录按钮交互精简**：切号按钮加载态与刷新按钮保持一致，去掉额外渐变动画。

            ## 下载前请先选对架构

            **不同芯片的安装包不通用，下错了会闪退或装不上。** 不确定自己是哪个：

            - **macOS**：苹果菜单 → 关于本机 → 看到 `芯片：Apple…` 选 `aarch64`，看到 `处理器：Intel…` 选 `x64`
            - **Windows**：设置 → 系统 → 关于 → 系统类型；普通 PC / 笔记本一般选 `x64`
            - **Linux**：主流 amd64 机器选 `amd64.deb` / `x86_64.rpm` / `amd64.AppImage`

            ## 各平台对应文件

            | 系统 | 安装包 |
            |------|--------|
            | macOS Apple Silicon (M1/M2/M3/M4) | `AVW_*_aarch64.dmg` |
            | macOS Intel | `AVW_*_x64.dmg` |
            | Windows x64 | `AVW_*_x64-setup.exe` 或 `AVW_*_x64_en-US.msi` |
            | Windows ARM64 | `AVW_*_arm64-setup.exe` 或 `AVW_*_arm64_en-US.msi` |
            | Linux Debian / Ubuntu | `AVW_*_amd64.deb` |
            | Linux Fedora / RHEL | `AVW-*_x86_64.rpm` |
            | Linux 其它 | `AVW_*_amd64.AppImage` |

            ## macOS 首次启动：去掉隔离标记（必看）

            App 未经过 Apple 公证，首次打开会提示 **"已损坏，无法打开"** 或 **"无法验证开发者"**。把 `.app` 拖进 `应用程序` 后，在「终端」执行一次：

            ```bash
            sudo xattr -rd com.apple.quarantine /Applications/AVW.app
            ```

            回车后输入开机密码即可正常打开，**只需执行一次**，后续升级无需再做。

            ## Windows / Linux 提示

            - **Windows**：SmartScreen 拦截时点 `更多信息` → `仍要运行`。
            - **Linux (.deb)**：`sudo dpkg -i AVW_*_amd64.deb && sudo apt-get install -f`
            - **Linux (.rpm)**：`sudo dnf install ./AVW-*_x86_64.rpm`
            - **Linux (.AppImage)**：`chmod +x AVW_*_amd64.AppImage && ./AVW_*_amd64.AppImage`

            ---

            遇到问题或反馈，加作者微信：`_liubao`
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const name = `Windsurf Manager ${tag}`;
            const body = process.env.RELEASE_BODY;

            try {
              const { data } = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: data.id,
                name,
                body,
                draft: false,
                prerelease: false,
              });
              return data.id;
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            try {
              const { data } = await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tag,
                name,
                body,
                draft: false,
                prerelease: false,
              });
              return data.id;
            } catch (error) {
              if (error.status !== 422) {
                throw error;
              }
              const { data } = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              return data.id;
            }

  release:
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            args: --target aarch64-apple-darwin
            name: macos-arm64
            rust-targets: aarch64-apple-darwin
          - platform: macos-14
            args: --target x86_64-apple-darwin
            name: macos-x64
            rust-targets: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
            name: linux-x64
            rust-targets: x86_64-unknown-linux-gnu
          - platform: windows-2022
            args: --target aarch64-pc-windows-msvc
            name: windows-arm64
            rust-targets: aarch64-pc-windows-msvc
          - platform: windows-2022
            args: --target x86_64-pc-windows-msvc
            name: windows-x64
            rust-targets: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          key: ${{ matrix.name }}

      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            libxdo-dev \
            libssl-dev \
            rpm \
            patchelf \
            build-essential \
            curl \
            wget \
            file

      - name: Install frontend deps
        run: npm ci

      - name: Build & Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.prepare-release.outputs.release_id }}
          args: ${{ matrix.args }}
