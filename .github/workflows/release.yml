name: Release

# 触发：push 形如 v1.2.3 的 tag
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            args: --target aarch64-apple-darwin
            name: macos-arm64
            rust-targets: aarch64-apple-darwin
          - platform: macos-14
            args: --target x86_64-apple-darwin
            name: macos-x64
            rust-targets: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
            name: linux-x64
            rust-targets: x86_64-unknown-linux-gnu
          - platform: windows-latest
            args: --target aarch64-pc-windows-msvc
            name: windows-arm64
            rust-targets: aarch64-pc-windows-msvc
          - platform: windows-latest
            args: --target x86_64-pc-windows-msvc
            name: windows-x64
            rust-targets: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          key: ${{ matrix.name }}

      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            libxdo-dev \
            libssl-dev \
            rpm \
            patchelf \
            build-essential \
            curl \
            wget \
            file

      - name: Install frontend deps
        run: npm ci

      - name: Build & Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Windsurf Manager ${{ github.ref_name }}
          releaseBody: |
            ## 本次更新亮点

            - **支持 Windsurf - Next 预览版**：在右下角 ⚙ Windsurf 设置里切换客户端类型，登录会自动走 `windsurf-next://` 协议 + Next 专属用户数据目录。
            - **自定义 Windsurf 安装路径**：Windsurf 装到非默认位置时，可在设置里手动填写或点"自动检测"，支持 macOS / Windows（含开始菜单快捷方式解析）/ Linux 常见位置。
            - **自定义用户数据目录**：支持便携模式或用 `--user-data-dir` 启动 Windsurf 的场景，机器 ID 重置会正确命中你指定的 `storage.json`。

            ## 下载前请先选对架构

            **不同芯片的安装包不通用，下错了会闪退或装不上。** 不确定自己是哪个：

            - **macOS**：苹果菜单 → 关于本机 → 看到 `芯片：Apple…` 选 `aarch64`，看到 `处理器：Intel…` 选 `x64`
            - **Windows**：设置 → 系统 → 关于 → 系统类型；普通 PC / 笔记本一般选 `x64`
            - **Linux**：主流 amd64 机器选 `amd64.deb` / `x86_64.rpm` / `amd64.AppImage`

            ## 各平台对应文件

            | 系统 | 安装包 |
            |------|--------|
            | macOS Apple Silicon (M1/M2/M3/M4) | `AVW_*_aarch64.dmg` |
            | macOS Intel | `AVW_*_x64.dmg` |
            | Windows x64 | `AVW_*_x64-setup.exe` 或 `AVW_*_x64_en-US.msi` |
            | Windows ARM64 | `AVW_*_arm64-setup.exe` 或 `AVW_*_arm64_en-US.msi` |
            | Linux Debian / Ubuntu | `AVW_*_amd64.deb` |
            | Linux Fedora / RHEL | `AVW-*_x86_64.rpm` |
            | Linux 其它 | `AVW_*_amd64.AppImage` |

            ## macOS 首次启动：去掉隔离标记（必看）

            App 未经过 Apple 公证，首次打开会提示 **"已损坏，无法打开"** 或 **"无法验证开发者"**。把 `.app` 拖进 `应用程序` 后，在「终端」执行一次：

            ```bash
            sudo xattr -rd com.apple.quarantine /Applications/AVW.app
            ```

            回车后输入开机密码即可正常打开，**只需执行一次**，后续升级无需再做。

            ## Windows / Linux 提示

            - **Windows**：SmartScreen 拦截时点 `更多信息` → `仍要运行`。
            - **Linux (.deb)**：`sudo dpkg -i AVW_*_amd64.deb && sudo apt-get install -f`
            - **Linux (.rpm)**：`sudo dnf install ./AVW-*_x86_64.rpm`
            - **Linux (.AppImage)**：`chmod +x AVW_*_amd64.AppImage && ./AVW_*_amd64.AppImage`

            ---

            遇到问题或反馈，加作者微信：`_liubao`
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
